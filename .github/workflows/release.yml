name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
    
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o "code-dep${{ matrix.suffix }}" ./cmd/server

      - name: Package
        run: |
          TAG="${{ github.ref_name }}"
          NAME="code-dep-${TAG#v}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          cp "code-dep${{ matrix.suffix }}" "dist/${NAME}/"
          cp -r web "dist/${NAME}/"
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: code-dep-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz
