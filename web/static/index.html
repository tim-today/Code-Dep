<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>轻发布</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Geist:wght@500;600;700&family=JetBrains+Mono:wght@400;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..24,400,0..1,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260601c-worker-management">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
  <section id="loginView" class="login-view">
    <form id="loginForm" class="login-card">
      <div class="brand login-brand">
        <span class="brand-mark">轻</span>
        <div>
          <strong data-i18n="app_name">轻发布</strong>
          <small data-i18n="app_subtitle">项目发布系统</small>
        </div>
      </div>
      <h1 data-i18n="login_title">登录</h1>
      <div class="field"><label data-i18n="login_account">账号</label><input id="loginCode" autocomplete="username" placeholder="admin"></div>
      <div class="field"><label data-i18n="login_password">密码</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入密码" data-i18n-placeholder="login_placeholder_pwd"></div>
      <button class="primary" type="submit" data-i18n="login_btn">登录</button>
      <p id="loginError" class="error-text"></p>
      <small class="hint" data-i18n="login_hint">首次启动默认账号：admin / 123456，请登录后修改密码。</small>
      <div style="text-align:center;margin-top:12px;"><button type="button" id="langBtnLogin" class="lang-btn" onclick="setLang(getLang()==='zh'?'en':'zh')" title="Language / 语言">EN</button></div>
    </form>
  </section>
  <main>
    <header class="topbar">
      <div class="topbar-left">
        <button id="homeLogo" class="topbar-brand" type="button" title="项目列表">
          <span class="brand-mark">轻</span>
          <strong>轻发布</strong>
        </button>
        <label class="search-box">
          <span class="material-symbols-outlined">search</span>
          <input id="globalSearch" placeholder="搜索项目、编号、分组..." data-i18n-placeholder="search_placeholder" autocomplete="off">
        </label>
      </div>
      <div class="topbar-icons">
        <button id="langBtn" class="lang-btn" type="button" onclick="setLang(getLang()==='zh'?'en':'zh')" title="Language / 语言">EN</button>
        <a class="topbar-link" href="https://github.com/tim-today/Code-Dep" target="_blank" title="GitHub"><span class="material-symbols-outlined">open_in_new</span></a>
        <div class="notif-wrap">
          <button id="notifBtn" class="icon" type="button" aria-label="通知"><span class="material-symbols-outlined">notifications_active</span><span id="notifBadge" class="notif-badge" style="display:none">0</span></button>
          <div id="notifDropdown" class="notif-dropdown"></div>
        </div>
        <button id="settingsBtn" class="icon" type="button" aria-label="设置"><span class="material-symbols-outlined">settings_suggest</span></button>
        <button id="accountBtn" class="account-btn" type="button" aria-label="账号"><span class="material-symbols-outlined">account_circle</span><strong id="accountName">-</strong></button>
      </div>
    </header>
    <section class="page-head">
      <div>
        <h1 id="pageTitle" data-i18n="nav_projects">项目</h1>
        <p id="pageDesc" data-i18n="page_desc_projects">管理项目配置、发布环境、版本回退。</p>
      </div>
      <button id="primaryBtn" class="primary" data-i18n="btn_new_project">新建项目</button>
    </section>
    <section id="content" class="canvas"></section>
  </main>

  <footer class="app-footer">
    <span data-i18n="app_name">轻发布 CodeDeploy</span>
    <span class="footer-sep">·</span>
    <span data-i18n="app_subtitle">轻量级自动化编译发布平台</span>
    <span class="footer-sep">·</span>
    <span>v1.0.0</span>
    <span class="footer-sep">·</span>
    <a href="https://github.com/tim-today/Code-Dep" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <dialog id="modal">
    <form method="dialog" class="modal">
      <div class="modal-head">
        <h2 id="modalTitle" data-i18n="modal_title">编辑</h2>
        <button class="icon" value="cancel" aria-label="关闭">×</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button value="cancel">取消</button>
        <button id="modalSave" value="default" class="primary">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="publishModal" class="publish-dialog">
    <form method="dialog" class="modal publish-workspace">
      <div class="modal-head">
        <div class="publish-title">
          <h2 data-i18n="publish_title">项目发布</h2>
          <span id="publishModeTag" class="badge">编译并发布</span>
        </div>
        <button class="icon" value="cancel" aria-label="关闭">×</button>
      </div>
      <div id="publishBody"></div>
      <pre id="liveLog" class="live-log"></pre>
      <div class="modal-actions">
        <button value="cancel">关闭</button>
        <button id="stopPublish" type="button" class="danger" style="display:none">终止发布</button>
        <button id="startPublish" value="default" class="primary">开始发布</button>
      </div>
    </form>
  </dialog>

  <dialog id="consoleModal" class="console-dialog">
    <div class="console-workspace">
      <div class="console-head">
        <div class="console-title">
          <span class="material-symbols-outlined">terminal</span>
          <strong id="consoleNodeName" data-i18n="node_console">节点控制台</strong>
          <span id="consoleStatus" class="badge">连接中</span>
        </div>
        <button class="icon" onclick="closeConsole()" aria-label="关闭"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div id="consoleTerminal"></div>
    </div>
  </dialog>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="/i18n.js?v=20260601c"></script>
  <script src="/app.js?v=20260601c-worker-management"></script>
</body>
</html>
